version: "2"
type: backend
tech_stack:
  - python
  - fastapi
  - crewai
  - pydantic-v2
  - uvicorn
features:
  - name: Health & Service Info
    description: Root and health endpoints return service metadata
    files:
      - main.py
    endpoints:
      - method: GET
        path: /api/health
        description: Health check endpoint
        auth_required: false
        response_schema:
          "200": '{"status":"ok","service":"Creator Skill Backend","version":"1.0.0"}'
      - method: GET
        path: /
        description: Root service info with API docs links
        auth_required: false
        response_schema:
          "200": '{"service":"...","version":"...","workflows":{...},"endpoints":{...}}'
  - name: Raw Paste Skill Generation
    description: Generate skill from pasted creator content
    files:
      - main.py
      - app/crew.py
      - app/service.py
      - app/schemas.py
    endpoints:
      - method: POST
        path: /api/v1/generate-skill
        description: Generate skill bundle from raw pasted content (60-120s)
        auth_required: false
        request_schema:
          body:
            creator_content: string (min 40 chars)
            desired_skill_name: string (optional)
            target_outcome: string (optional)
            audience: string (optional)
            include_openai_yaml: boolean (default true)
            persist_to_disk: boolean (default true)
            include_zip: boolean (default true)
        response_schema:
          "200": GenerateSkillResponse
          "422": Pydantic validation error (string_too_short)
          "500": Internal server error
      - method: POST
        path: /api/v2/generate-skill
        description: Same as v1 generate skill
        auth_required: false
        request_schema:
          body:
            creator_content: string (min 40 chars)
            desired_skill_name: string (optional)
        response_schema:
          "200": GenerateSkillResponse
          "422": Pydantic validation error
  - name: Raw Paste Skill Generation SSE Stream
    description: Generate skill from pasted content with real-time SSE events
    files:
      - main.py
      - app/crew.py
      - app/service.py
    endpoints:
      - method: POST
        path: /api/v1/generate-skill/stream
        description: SSE stream for raw paste skill generation
        auth_required: false
        request_schema:
          body:
            creator_content: string (min 40 chars)
            desired_skill_name: string (optional)
        response_schema:
          "200": "text/event-stream with SSE events (crew_start, task_start, step, task_done, crew_done, result, done)"
          "422": Pydantic validation error
      - method: POST
        path: /api/v2/generate-skill/stream
        description: SSE stream for raw paste skill generation (v2)
        auth_required: false
        request_schema:
          body:
            creator_content: string (min 40 chars)
            desired_skill_name: string (optional)
        response_schema:
          "200": "text/event-stream with SSE events"
          "422": Pydantic validation error
  - name: Twitter/X Skill Generation
    description: Fetch tweets and generate skill from Twitter user content
    files:
      - main.py
      - app/twitter_client.py
      - app/crew.py
      - app/service.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/twitter
        description: Generate skill from Twitter user tweets (60-120s)
        auth_required: false
        request_schema:
          body:
            twitter_username: string (min 1, max 15 chars)
            desired_skill_name: string (optional)
        response_schema:
          "200": GenerateSkillResponse with source_metadata
          "400": X_BEARER_TOKEN not configured or no tweets found
          "422": Pydantic validation error
          "502": X API upstream error (user not found)
  - name: Twitter/X Skill Generation SSE Stream
    description: Fetch tweets and generate skill with real-time SSE events
    files:
      - main.py
      - app/twitter_client.py
      - app/crew.py
      - app/service.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/twitter/stream
        description: SSE stream for Twitter skill generation
        auth_required: false
        request_schema:
          body:
            twitter_username: string (min 1, max 15 chars)
            desired_skill_name: string (optional)
        response_schema:
          "200": "text/event-stream with SSE events"
          "400": X_BEARER_TOKEN not configured
          "422": Pydantic validation error
          "502": X API upstream error
  - name: YouTube Skill Generation
    description: Fetch transcripts and generate skill from YouTube videos
    files:
      - main.py
      - app/youtube_client.py
      - app/crew.py
      - app/service.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/youtube
        description: Generate skill from YouTube video transcripts (60-200s)
        auth_required: false
        request_schema:
          body:
            youtube_urls: array of strings (min 1 item)
            desired_skill_name: string (optional)
        response_schema:
          "200": GenerateSkillResponse with source_metadata
          "400": Invalid YouTube URL or YouTubeError
          "422": Pydantic validation error (too_short for empty array)
  - name: YouTube Skill Generation SSE Stream
    description: Fetch transcripts and generate skill with real-time SSE events
    files:
      - main.py
      - app/youtube_client.py
      - app/crew.py
      - app/service.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/youtube/stream
        description: SSE stream for YouTube skill generation
        auth_required: false
        request_schema:
          body:
            youtube_urls: array of strings (min 1 item)
            desired_skill_name: string (optional)
        response_schema:
          "200": "text/event-stream with SSE events"
          "400": Invalid YouTube URL
          "422": Pydantic validation error
  - name: Skill Listing & Detail
    description: List and retrieve generated skills
    files:
      - main.py
    endpoints:
      - method: GET
        path: /api/v1/skills
        description: List all generated skills with metadata
        auth_required: false
        response_schema:
          "200": '{"skills":[...],"count":N}'
      - method: GET
        path: /api/v1/skills/{skill_name}
        description: Get full skill detail with file contents
        auth_required: false
        response_schema:
          "200": SkillDetail with files array
          "404": Skill not found
      - method: DELETE
        path: /api/v1/skills/{skill_name}
        description: Delete a skill and its zip
        auth_required: false
        response_schema:
          "200": '{"deleted":"skill_name"}'
          "404": Skill not found
  - name: Export & Download
    description: Export skill files as zip or individual downloads
    files:
      - main.py
    endpoints:
      - method: GET
        path: /api/v1/export/{skill_name}/zip
        description: Download skill as zip archive
        auth_required: false
        response_schema:
          "200": application/zip file
          "404": Zip not found
      - method: GET
        path: /api/v1/export/{skill_name}/{file_path}
        description: Download single file from a skill
        auth_required: false
        response_schema:
          "200": File content
          "400": Invalid path (path traversal)
          "404": File not found
      - method: POST
        path: /api/v1/export/copy
        description: Get raw file content for clipboard copy
        auth_required: false
        request_schema:
          body:
            skill_name: string
            file_path: string
        response_schema:
          "200": '{"content":"...","file_path":"..."}'
          "400": Invalid path
          "404": File not found
  - name: Security - Path Traversal Protection
    description: Middleware blocks requests containing ".." in URL paths
    files:
      - main.py
    endpoints: []
    depends_on:
      - Export & Download
known_limitations:
  - issue: CrewAI pipeline takes 60-120s, exceeding TestSprite 30s tunnel timeout
    location: app/crew.py
    impact: Generation endpoints cannot be fully tested through TestSprite tunnel
  - issue: X_BEARER_TOKEN is configured on server, cannot test missing-token path
    location: main.py
    impact: TC for missing bearer token will always trigger real API call
  - issue: SSE streaming endpoints return text/event-stream not JSON
    location: main.py
    impact: Tests must parse SSE format (event + data lines) not standard JSON
