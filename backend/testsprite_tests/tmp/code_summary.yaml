version: "2"
type: backend
tech_stack:
  - python
  - fastapi
  - pydantic
  - crewai
  - httpx
  - youtube-transcript-api
  - uvicorn
features:
  - name: Health and Info
    description: Root service info and health check endpoints
    files:
      - main.py
    endpoints:
      - method: GET
        path: /
        description: Service info with endpoint map and workflow descriptions
        auth_required: false
        response_schema:
          "200": ServiceInfo
      - method: GET
        path: /api/health
        description: Health check returning status ok
        auth_required: false
        response_schema:
          "200": HealthResponse
    depends_on: []

  - name: V1 Skill Generation
    description: Generate skill packages from raw pasted creator content
    files:
      - main.py
      - app/service.py
      - app/crew.py
      - app/schemas.py
    endpoints:
      - method: POST
        path: /api/v1/generate-skill
        description: Generate a skill package from pasted content (min 40 chars)
        auth_required: false
        request_schema:
          body:
            creator_content: string (min 40 chars, required)
            desired_skill_name: string (optional)
            target_outcome: string (optional)
            audience: string (optional)
            persist_to_disk: boolean (default true)
            include_zip: boolean (default true)
        response_schema:
          "200": GenerateSkillResponse
          "422": Pydantic validation error (string_too_short)
          "500": Internal server error
    depends_on: []

  - name: V2 Twitter Integration
    description: Fetch last 25 tweets from a Twitter/X user and generate a skill
    files:
      - main.py
      - app/twitter_client.py
      - app/schemas.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/twitter
        description: Generate skill from Twitter user's last 25 tweets (no retweets)
        auth_required: false
        request_schema:
          body:
            twitter_username: string (1-15 chars, required)
            desired_skill_name: string (optional)
            target_outcome: string (optional)
        response_schema:
          "200": GenerateSkillResponse with source_metadata
          "400": X_BEARER_TOKEN not configured or no tweets found
          "422": Pydantic validation error
          "502": X API error (auth, not found, rate limit)
    depends_on:
      - V1 Skill Generation

  - name: V2 YouTube Integration
    description: Fetch transcripts from YouTube URLs and generate a skill
    files:
      - main.py
      - app/youtube_client.py
      - app/schemas.py
    endpoints:
      - method: POST
        path: /api/v2/generate-skill/youtube
        description: Generate skill from YouTube video transcripts
        auth_required: false
        request_schema:
          body:
            youtube_urls: list of strings (min 1 item, required)
            desired_skill_name: string (optional)
        response_schema:
          "200": GenerateSkillResponse with source_metadata and warnings
          "400": YouTubeError (no valid URLs, no transcripts)
          "422": Pydantic validation error
    depends_on:
      - V1 Skill Generation

  - name: Skill Listing and Detail
    description: List all generated skills or get detail for a single skill
    files:
      - main.py
      - app/storage.py
    endpoints:
      - method: GET
        path: /api/v1/skills
        description: List all generated skills with file summaries (no content)
        auth_required: false
        response_schema:
          "200": SkillList with count
      - method: GET
        path: /api/v1/skills/{skill_name}
        description: Get full detail for a single skill including file contents
        auth_required: false
        response_schema:
          "200": SkillDetail with files and content
          "404": Skill not found
      - method: DELETE
        path: /api/v1/skills/{skill_name}
        description: Delete a generated skill directory and its zip
        auth_required: false
        response_schema:
          "200": Deletion confirmation
          "404": Skill not found
      - method: GET
        path: /api/v2/skills
        description: Same as v1 skills list
        auth_required: false
        response_schema:
          "200": SkillList with count
      - method: GET
        path: /api/v2/skills/{skill_name}
        description: Same as v1 skill detail
        auth_required: false
        response_schema:
          "200": SkillDetail
          "404": Skill not found
      - method: DELETE
        path: /api/v2/skills/{skill_name}
        description: Same as v1 delete skill
        auth_required: false
        response_schema:
          "200": Deletion confirmation
          "404": Skill not found
    depends_on: []

  - name: Export and Download
    description: Download skill files as zip, individual files, or raw content for clipboard
    files:
      - main.py
    endpoints:
      - method: GET
        path: /api/v1/export/{skill_name}/zip
        description: Download skill package as zip archive
        auth_required: false
        response_schema:
          "200": ZIP file (application/zip)
          "404": Zip not found
      - method: GET
        path: /api/v1/export/{skill_name}/{file_path}
        description: Download a single file from a skill package
        auth_required: false
        response_schema:
          "200": File content (text/markdown or text/plain)
          "400": Invalid path (path traversal attempt)
          "404": File not found
      - method: POST
        path: /api/v1/export/copy
        description: Get raw file content for clipboard copy
        auth_required: false
        request_schema:
          body:
            skill_name: string (required)
            file_path: string (required)
        response_schema:
          "200": JSON with content and file_path
          "400": Invalid path
          "404": File not found
      - method: GET
        path: /api/v2/export/{skill_name}/zip
        description: Same as v1 export zip
        auth_required: false
        response_schema:
          "200": ZIP file
          "404": Zip not found
      - method: GET
        path: /api/v2/export/{skill_name}/{file_path}
        description: Same as v1 export file
        auth_required: false
        response_schema:
          "200": File content
          "400": Invalid path
          "404": File not found
      - method: POST
        path: /api/v2/export/copy
        description: Same as v1 copy content
        auth_required: false
        request_schema:
          body:
            skill_name: string
            file_path: string
        response_schema:
          "200": JSON with content
          "400": Invalid path
          "404": File not found
    depends_on:
      - Skill Listing and Detail

  - name: Security Middleware
    description: Path traversal guard blocks requests with ".." in the URL path
    files:
      - main.py
    endpoints:
      - method: GET
        path: /api/v1/export/..%2F..%2Fetc/passwd
        description: Path traversal attempt — blocked by middleware
        auth_required: false
        response_schema:
          "400": Invalid path
    depends_on: []

known_limitations:
  - issue: CrewAI generation takes 60-120 seconds per call
    location: app/service.py
    impact: Requests to generate-skill endpoints may timeout on short HTTP timeouts
  - issue: Generated skills are stored on ephemeral filesystem
    location: app/storage.py
    impact: Skills are lost on Railway redeploy
  - issue: V1 and V2 share the same generated_skills directory
    location: app/config.py
    impact: Skills from both workflows appear in both /api/v1/skills and /api/v2/skills
